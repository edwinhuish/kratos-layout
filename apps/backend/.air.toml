#:schema https://json.schemastore.org/air.toml

# Air 配置文件
# 用于 Go 应用热重载开发

root = "."
tmp_dir = "tmp"

[build]
# 注意：程序名需要与 cmd 目录下的子文件夹名称一致
bin = "./bin/server"
cmd = "go build -o ./bin/server ./cmd/server"
delay = 1000
exclude_dir = ["assets", "bin", "vendor", "testdata", "internal/service", "third_party"]
exclude_regex = ["_test.go", "_gen.go"]
exclude_unchanged = false
follow_symlink = false
include_ext = ["go", "tpl", "tmpl", "html", "proto"]
log = "build-errors.log"
send_interrupt = false
stop_on_error = false

[log]
main_only = false
time = false

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = true
